name: Deploy client-app to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/projects/client-app/**'
      - 'frontend/angular.json'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npx ng build client-app --configuration production --base-href /investment-platform/

      - name: SPA fallback
        working-directory: frontend/dist/client-app/browser
        run: cp index.html 404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/client-app/browser

      - id: deployment
        uses: actions/deploy-pages@v4