<div
  class="shell"
  [class.shell--collapsed]="sidebarCollapsed()"
  [class.shell--dark]="themeService.darkMode()"
>
  <header class="shell-topbar">
    <div class="shell-topbar-start">
      <a class="shell-brand" [routerLink]="['/', appRoutePaths.dashboard]" aria-label="Admin Platform home">
        <img src="assets/images/admin-platform-logo.svg" alt="" width="32" height="32" />
        <span class="shell-brand-title">Admin Platform</span>
      </a>
    </div>

    <admin-app-shell-topbar-actions />
  </header>

  <admin-app-shell-sidebar />

  <div class="shell-main">
    <header class="shell-header">
      <p-button
        type="button"
        icon="pi pi-angle-left"
        [text]="true"
        [rounded]="true"
        ariaLabel="Toggle sidebar"
        (onClick)="toggleSidebar()"
      />
    </header>

    <main class="shell-content">
      <router-outlet />
    </main>
  </div>
</div>
