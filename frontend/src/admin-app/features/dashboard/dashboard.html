<p-toolbar class="dashboard-toolbar">
  <ng-template #start>
    <h1>Dashboard</h1>
  </ng-template>
</p-toolbar>

<p-card class="dashboard-section" header="Active clients">
  <admin-app-users-table
    [users]="users()"
    [loading]="loading()"
    (viewUser)="viewUser($event)"
  />
</p-card>

<p-card class="dashboard-section" header="Last withdrawals">
  <admin-app-dashboard-transactions-table
    [transactions]="transactions()"
    [loading]="transactionsLoading()"
  />
</p-card>
