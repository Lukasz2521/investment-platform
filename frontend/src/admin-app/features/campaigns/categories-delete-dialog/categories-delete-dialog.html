<p-dialog
  header="Delete Category"
  [(visible)]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="false"
  [dismissableMask]="false"
  [style]="{ width: '28rem', maxWidth: '95vw' }"
>
  <p>
    Are you sure you want to delete
    <strong>{{ category()?.name }}</strong>?
  </p>

  <ng-template #footer>
    <div class="categories-delete-footer">
      <p-button
        type="button"
        label="CANCEL"
        [outlined]="true"
        [disabled]="deleting()"
        (onClick)="onCancel()"
      />
      <p-button
        type="button"
        label="DELETE"
        severity="danger"
        [loading]="deleting()"
        [disabled]="deleting()"
        (onClick)="confirm.emit()"
      />
    </div>
  </ng-template>
</p-dialog>
