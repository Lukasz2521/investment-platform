<p-toolbar class="transactions-list-toolbar">
  <ng-template #start>
    <h1>Transactions List</h1>
  </ng-template>

  <ng-template #end>
    <p-button icon="pi pi-plus" ariaLabel="Add transaction" (onClick)="openAddDialog()" />
  </ng-template>
</p-toolbar>

<p-card>
  <admin-app-transactions-table
    [transactions]="transactions()"
    [loading]="loading()"
    (deleteTransaction)="openDeleteDialog($event)"
  />
</p-card>

<admin-app-transactions-create-dialog
  [(visible)]="formDialogVisible"
  [users]="users()"
  (transactionCreated)="onTransactionCreated()"
/>

<admin-app-transactions-delete-dialog
  [(visible)]="deleteDialogVisible"
  [transaction]="transactionToDelete()"
  [deleting]="deleting()"
  (confirm)="confirmDelete()"
/>
