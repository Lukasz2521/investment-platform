<p-dialog
  header="Create Transaction"
  [(visible)]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="false"
  [dismissableMask]="false"
  [style]="{ width: '32rem', maxWidth: '95vw' }"
  styleClass="transactions-create-dialog"
  (onHide)="closeDialog()"
>
  <form class="transactions-create-dialog-form" [formGroup]="form" (ngSubmit)="submit()">
    <label class="transactions-create-dialog-field">
      <span class="transactions-create-dialog-label"
        >Amount<span class="transactions-create-dialog-required">*</span></span
      >
      <input pInputText type="text" formControlName="amount" inputmode="decimal" />
    </label>

    <label class="transactions-create-dialog-field">
      <span class="transactions-create-dialog-label"
        >Currency<span class="transactions-create-dialog-required">*</span></span
      >
      <p-select
        formControlName="currency"
        [options]="currencyOptions"
        optionLabel="label"
        optionValue="value"
        appendTo="body"
      />
    </label>

    <label class="transactions-create-dialog-field">
      <span class="transactions-create-dialog-label">Type</span>
      <p-select
        formControlName="transaction_type"
        [options]="typeOptions"
        optionLabel="label"
        optionValue="value"
        appendTo="body"
      />
    </label>

    <label class="transactions-create-dialog-field">
      <span class="transactions-create-dialog-label">Status</span>
      <p-select
        formControlName="status"
        [options]="statusOptions"
        optionLabel="label"
        optionValue="value"
        appendTo="body"
      />
    </label>

    <label class="transactions-create-dialog-field">
      <span class="transactions-create-dialog-label"
        >User<span class="transactions-create-dialog-required">*</span></span
      >
      <p-select
        formControlName="user_id"
        [options]="userOptions()"
        optionLabel="label"
        optionValue="value"
        placeholder="Select user"
        [filter]="true"
        filterBy="label"
        filterPlaceholder="Search"
      />
    </label>

    <label class="transactions-create-dialog-field">
      <span class="transactions-create-dialog-label">Description</span>
      <textarea
        class="transactions-create-dialog-textarea"
        formControlName="description"
        rows="4"
      ></textarea>
    </label>
  </form>

  <ng-template #footer>
    <div class="transactions-create-dialog-footer">
      <p-button
        type="button"
        label="CANCEL"
        [outlined]="true"
        [disabled]="submitting()"
        (onClick)="closeDialog()"
      />
      <p-button
        type="button"
        label="SAVE"
        severity="secondary"
        [loading]="submitting()"
        [disabled]="form.invalid || submitting()"
        (onClick)="submit()"
      />
    </div>
  </ng-template>
</p-dialog>
