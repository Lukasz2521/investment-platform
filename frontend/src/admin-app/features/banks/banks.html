<p-toolbar class="banks-toolbar">
  <ng-template #start>
    <h1>Banks</h1>
  </ng-template>

  <ng-template #end>
    <p-button icon="pi pi-plus" ariaLabel="Add bank" (onClick)="openAddDialog()" />
  </ng-template>
</p-toolbar>

<p-card>
  <admin-app-banks-table
    [banks]="banks()"
    [loading]="loading()"
    (deleteBank)="openDeleteDialog($event)"
  />
</p-card>

<admin-app-banks-add-dialog
  [(visible)]="addDialogVisible"
  (bankCreated)="onBankCreated($event)"
/>

<admin-app-banks-delete-dialog
  [(visible)]="deleteDialogVisible"
  [bank]="bankToDelete()"
  [deleting]="deleting()"
  (confirm)="confirmDelete()"
/>
