<p-dialog
  header="Delete User"
  [(visible)]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="false"
  [dismissableMask]="false"
  [style]="{ width: '28rem', maxWidth: '95vw' }"
>
  @if (user(); as currentUser) {
    <p>
      Are you sure you want to delete
      <strong>{{ displayName(currentUser) }}</strong>?
    </p>
  }

  <ng-template #footer>
    <div class="user-detail-delete-footer">
      <p-button
        type="button"
        label="CANCEL"
        [outlined]="true"
        [disabled]="deleting()"
        (onClick)="onCancel()"
      />
      <p-button
        type="button"
        label="DELETE"
        severity="danger"
        [loading]="deleting()"
        [disabled]="deleting()"
        (onClick)="confirm.emit()"
      />
    </div>
  </ng-template>
</p-dialog>
