<div
  class="shell"
  [class.shell--collapsed]="sidebarCollapsed()"
  [class.shell--dark]="themeService.darkMode()"
>
  <header class="shell-topbar">
    <div class="shell-topbar-start">
      <a class="shell-brand" [routerLink]="['/', appRoutePaths.dashboard]" aria-label="Admin Platform home">
        <img src="assets/images/admin-platform-logo.svg" alt="" width="32" height="32" />
        <span class="shell-brand-title">Admin Platform</span>
      </a>
    </div>

    <div class="shell-topbar-end">
      <p-button
        type="button"
        [icon]="themeService.darkMode() ? 'pi pi-sun' : 'pi pi-moon'"
        [text]="true"
        [rounded]="true"
        ariaLabel="Toggle dark mode"
        (onClick)="themeService.toggle()"
      />

      <span class="shell-topbar-divider" aria-hidden="true"></span>

      <div class="shell-user">
        <p-avatar [label]="userInitials()" shape="circle" />
        <span class="shell-user-name">{{ userDisplayName() }}</span>
        <i class="pi pi-chevron-down shell-user-chevron" aria-hidden="true"></i>
      </div>
    </div>
  </header>

  <aside class="shell-sidebar">
    <nav class="shell-nav" aria-label="Main navigation">
      @for (item of navItems; track item.label) {
        @if (item.route) {
          <a
            class="shell-nav-item"
            [routerLink]="['/', item.route]"
            routerLinkActive="shell-nav-item--active"
            [attr.aria-label]="item.label"
            [title]="item.label"
          >
            <i [class]="item.icon"></i>
          </a>
        } @else {
          <span
            class="shell-nav-item shell-nav-item--disabled"
            [attr.aria-label]="item.label"
            [title]="item.label"
          >
            <i [class]="item.icon"></i>
          </span>
        }
      }
    </nav>
  </aside>

  <div class="shell-main">
    <header class="shell-header">
      <p-button
        type="button"
        icon="pi pi-angle-left"
        [text]="true"
        [rounded]="true"
        ariaLabel="Toggle sidebar"
        (onClick)="toggleSidebar()"
      />
    </header>

    <main class="shell-content">
      <router-outlet />
    </main>
  </div>
</div>
